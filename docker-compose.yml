# Pulled sample from https://github.com/dockersamples/example-voting-app/blob/main/docker-compose.yml

services:
  listen:
    build:
      context: ./app
      target: dev
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
    volumes:
      - ./vote:/usr/local/app
    ports:
      - "${APP_PORT}:80"
    networks:
      - front-tier
      - back-tier

  redis:
    image: redis:alpine
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: /healthchecks/redis.sh
      interval: 5s
    networks:
      - back-tier

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${AMQP_RABBITMQ_PORT}:5672"
      - "${WEBUI_RABBITMQ_PORT}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - back-tier

networks:
  front-tier:
  back-tier:

volumes:
  rabbitmq_data: