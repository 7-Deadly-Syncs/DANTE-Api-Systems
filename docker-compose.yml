# Pulled sample from https://github.com/dockersamples/example-voting-app/blob/main/docker-compose.yml
# Also notable https://github.com/docker/awesome-compose/tree/master/nginx-golang-postgres

services:
  listen:
    build:
      context: .
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
    networks:
      - front-tier
      - back-tier

  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - back-tier
      
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${AMQP_RABBITMQ_PORT}:5672"
      - "${WEBUI_RABBITMQ_PORT}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - back-tier

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASS}"
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - "db-data:/var/lib/postgresql/data"
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - back-tier

  proxy:
    image: nginx:latest
    volumes:
      - type: bind
        source: ./configs/nginx/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    ports: 
      - "${APP_PORT}:80"
    expose:
      - "80"
    networks:
      - front-tier

networks:
  front-tier:
  back-tier:

volumes:
  rabbitmq_data:
  db-data: